name: Generate Race Report

on:
  issues:
    types: [opened, edited, reopened]
  workflow_dispatch:
    inputs:
      race_name:
        description: Race report title
        required: true
        type: string
      race_url:
        description: Race participant source URL
        required: true
        type: string
      competition_name:
        description: Optional competition or distance filter
        required: false
        type: string
      score_threshold:
        description: Score threshold for the top-athlete table
        required: true
        default: "680"
        type: string
      top:
        description: Maximum number of displayed top rows
        required: true
        default: "100"
        type: string
      strategy:
        description: Report generation strategy
        required: true
        default: participant-first
        type: choice
        options:
          - participant-first
          - catalog-first
      notes:
        description: Optional notes for this run
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  prepare:
    if: ${{ github.event_name == 'workflow_dispatch' || contains(join(github.event.issue.labels.*.name, ','), 'report-request') }}
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.auth.outputs.authorized }}
      request_json: ${{ steps.request.outputs.request_json }}
      race_slug: ${{ steps.request.outputs.race_slug }}
      race_name: ${{ steps.request.outputs.race_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - id: auth
        env:
          REQUESTER: ${{ github.actor }}
          ALLOWED_REQUESTERS: ${{ vars.ALLOWED_REQUESTERS }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          python - <<'PY'
          import os

          requester = os.environ["REQUESTER"].strip()
          allowed_raw = os.getenv("ALLOWED_REQUESTERS", "").strip()
          allowed = {item.strip() for item in allowed_raw.split(",") if item.strip()}
          if not allowed:
              allowed = {os.getenv("REPO_OWNER", "").strip()}
          authorized = requester in allowed
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"authorized={'true' if authorized else 'false'}\n")
          PY

      - id: request
        if: steps.auth.outputs.authorized == 'true'
        env:
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          INPUT_RACE_NAME: ${{ inputs.race_name }}
          INPUT_RACE_URL: ${{ inputs.race_url }}
          INPUT_COMPETITION_NAME: ${{ inputs.competition_name }}
          INPUT_SCORE_THRESHOLD: ${{ inputs.score_threshold }}
          INPUT_TOP: ${{ inputs.top }}
          INPUT_STRATEGY: ${{ inputs.strategy }}
          INPUT_NOTES: ${{ inputs.notes }}
        run: |
          PYTHONPATH=src python - <<'PY'
          from dataclasses import asdict
          import json
          import os

          from trailintel.github_pipeline import (
              DEFAULT_SCORE_THRESHOLD,
              DEFAULT_STRATEGY,
              DEFAULT_TOP,
              ReportRequest,
              parse_issue_form,
          )

          if os.environ["EVENT_NAME"] == "issues":
              request = parse_issue_form(os.getenv("ISSUE_BODY", ""))
          else:
              request = ReportRequest(
                  race_name=os.getenv("INPUT_RACE_NAME", "").strip(),
                  race_url=os.getenv("INPUT_RACE_URL", "").strip(),
                  competition_name=os.getenv("INPUT_COMPETITION_NAME", "").strip(),
                  score_threshold=float(os.getenv("INPUT_SCORE_THRESHOLD") or DEFAULT_SCORE_THRESHOLD),
                  top=int(os.getenv("INPUT_TOP") or DEFAULT_TOP),
                  strategy=(os.getenv("INPUT_STRATEGY") or DEFAULT_STRATEGY).strip() or DEFAULT_STRATEGY,
                  notes=os.getenv("INPUT_NOTES", "").strip(),
              )

          payload = asdict(request)
          payload["race_slug"] = request.race_slug
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write("request_json<<EOF\n")
              handle.write(json.dumps(payload, ensure_ascii=False) + "\n")
              handle.write("EOF\n")
              handle.write(f"race_slug={payload['race_slug']}\n")
              handle.write(f"race_name={payload['race_name']}\n")
          PY

  deny_request:
    if: ${{ needs.prepare.outputs.authorized == 'false' && github.event_name == 'issues' }}
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "This repository accepts report requests only from the allowlisted GitHub accounts in `ALLOWED_REQUESTERS`.",
            });

  run_report:
    if: ${{ needs.prepare.outputs.authorized == 'true' }}
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      REQUEST_JSON: ${{ needs.prepare.outputs.request_json }}
      PAGES_REPO: ${{ vars.PAGES_REPO }}
      PAGES_BRANCH: ${{ vars.PAGES_BRANCH }}
      PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
      TRAILINTEL_CACHE_DB: ${{ github.workspace }}/.workflow-cache/trailintel_cache.duckdb
    outputs:
      publish_json: ${{ steps.publish.outputs.publish_json }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Restore athlete lookup cache
        uses: actions/cache/restore@v4
        with:
          path: .workflow-cache/trailintel_cache.duckdb
          key: trailintel-lookups-${{ runner.os }}-${{ github.repository }}-${{ github.run_id }}
          restore-keys: |
            trailintel-lookups-${{ runner.os }}-${{ github.repository }}-

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Build static report bundle
        run: |
          mkdir -p dist/site
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys
          from pathlib import Path

          from trailintel.github_pipeline import ReportRequest, build_cli_args

          payload = json.loads(os.environ["REQUEST_JSON"])
          request = ReportRequest(
              race_name=payload["race_name"],
              race_url=payload["race_url"],
              competition_name=payload.get("competition_name", ""),
              score_threshold=float(payload.get("score_threshold", 680.0)),
              top=int(payload.get("top", 100)),
              strategy=payload.get("strategy", "participant-first"),
              notes=payload.get("notes", ""),
          )
          args = [sys.executable, "-m", "trailintel.cli", *build_cli_args(request, site_dir=Path("dist/site"))]
          subprocess.run(args, check=True)
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: race-report-${{ needs.prepare.outputs.race_slug }}
          path: dist/site

      - name: Validate publish configuration
        env:
          PAGES_REPO_TOKEN: ${{ secrets.PAGES_REPO_TOKEN }}
        run: |
          if [ -z "$PAGES_REPO" ]; then
            echo "Missing repo variable PAGES_REPO (owner/repo)." >&2
            exit 1
          fi
          if [ -z "$PAGES_REPO_TOKEN" ]; then
            echo "Missing secret PAGES_REPO_TOKEN." >&2
            exit 1
          fi

      - name: Clone public Pages repository
        env:
          PAGES_REPO_TOKEN: ${{ secrets.PAGES_REPO_TOKEN }}
        run: |
          branch="${PAGES_BRANCH:-main}"
          git clone --depth 1 --branch "$branch" "https://x-access-token:${PAGES_REPO_TOKEN}@github.com/${PAGES_REPO}.git" pages-repo

      - id: derive_base_url
        run: |
          python - <<'PY'
          import os

          repo = os.getenv("PAGES_REPO", "").strip()
          explicit = os.getenv("PAGES_BASE_URL", "").strip()
          base = explicit
          if not base and "/" in repo:
              owner, name = repo.split("/", 1)
              base = f"https://{owner}.github.io/{name}"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"base_url={base}\n")
          PY

      - id: publish
        env:
          BASE_URL: ${{ steps.derive_base_url.outputs.base_url }}
        run: |
          python - <<'PY'
          from dataclasses import asdict
          from datetime import UTC, datetime
          import json
          import os
          from pathlib import Path

          from trailintel.github_pipeline import ReportRequest, publish_report_bundle

          payload = json.loads(os.environ["REQUEST_JSON"])
          request = ReportRequest(
              race_name=payload["race_name"],
              race_url=payload["race_url"],
              competition_name=payload.get("competition_name", ""),
              score_threshold=float(payload.get("score_threshold", 680.0)),
              top=int(payload.get("top", 100)),
              strategy=payload.get("strategy", "participant-first"),
              notes=payload.get("notes", ""),
          )
          result = publish_report_bundle(
              source_dir=Path("dist/site"),
              pages_root=Path("pages-repo"),
              request=request,
              published_at=datetime.now(UTC),
              base_url=os.getenv("BASE_URL") or None,
          )
          payload_out = asdict(result)
          Path("dist/publish.json").write_text(
              json.dumps(payload_out, indent=2, ensure_ascii=False),
              encoding="utf-8",
          )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write("publish_json<<EOF\n")
              handle.write(json.dumps(payload_out, ensure_ascii=False) + "\n")
              handle.write("EOF\n")
          PY

      - name: Commit and push published report
        run: |
          branch="${PAGES_BRANCH:-main}"
          cd pages-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No Pages changes to commit."
            exit 0
          fi
          git commit -m "Publish report: ${{ needs.prepare.outputs.race_name }}"
          git push origin "$branch"

      - name: Save athlete lookup cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .workflow-cache/trailintel_cache.duckdb
          key: trailintel-lookups-${{ runner.os }}-${{ github.repository }}-${{ github.run_id }}

      - name: Comment success on issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          PUBLISH_JSON: ${{ steps.publish.outputs.publish_json }}
        with:
          script: |
            const publish = JSON.parse(process.env.PUBLISH_JSON);
            const body = [
              "Report published successfully.",
              "",
              `- Latest report: ${publish.latest_url}`,
              `- This run: ${publish.report_url}`,
              `- CSV: ${publish.csv_url}`,
              `- JSON: ${publish.json_url}`,
              `- Workflow artifacts: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed",
            });

  comment_failure:
    if: ${{ always() && needs.prepare.outputs.authorized == 'true' && needs.run_report.result == 'failure' && github.event_name == 'issues' }}
    needs: [prepare, run_report]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Report generation failed. Check the workflow logs for run ${context.runId}: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
