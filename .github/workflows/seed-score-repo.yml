name: Seed Score Repo

on:
  workflow_dispatch:
    inputs:
      threshold:
        description: Minimum Betrail score to seed
        required: true
        default: "68"
        type: string
      fill_utmb:
        description: Also fetch UTMB scores for seeded athletes
        required: true
        default: true
        type: boolean
      fill_itra:
        description: Also fetch ITRA scores for seeded athletes
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SCORE_REPO: ${{ vars.SCORE_REPO }}
      SCORE_REPO_BRANCH: ${{ vars.SCORE_REPO_BRANCH }}
      SCORE_REPO_TOKEN: ${{ secrets.SCORE_REPO_TOKEN }}
      BETRAIL_COOKIE: ${{ secrets.BETRAIL_COOKIE }}
      ITRA_COOKIE: ${{ secrets.ITRA_COOKIE }}
      TRAILINTEL_SCORE_REPO: ${{ github.workspace }}/score-repo
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Validate seed configuration
        env:
          PAGES_REPO_TOKEN: ${{ secrets.PAGES_REPO_TOKEN }}
        run: |
          token="${SCORE_REPO_TOKEN:-$PAGES_REPO_TOKEN}"
          if [ -z "$token" ]; then
            echo "Missing SCORE_REPO_TOKEN or fallback PAGES_REPO_TOKEN." >&2
            exit 1
          fi

      - name: Clone score repo cache
        env:
          PAGES_REPO_TOKEN: ${{ secrets.PAGES_REPO_TOKEN }}
        run: |
          score_repo="${SCORE_REPO:-mpaladin/trail-intel-score}"
          branch="${SCORE_REPO_BRANCH:-main}"
          token="${SCORE_REPO_TOKEN:-$PAGES_REPO_TOKEN}"
          git clone --depth 1 --branch "$branch" "https://x-access-token:${token}@github.com/${score_repo}.git" "$TRAILINTEL_SCORE_REPO"

      - name: Seed score repo from Betrail
        run: |
          args=(
            trailintel-score
            seed-betrail
            --repo "$TRAILINTEL_SCORE_REPO"
            --threshold "${{ inputs.threshold }}"
          )
          if [ -n "$BETRAIL_COOKIE" ]; then
            args+=(--betrail-cookie "$BETRAIL_COOKIE")
          fi
          if [ "${{ inputs.fill_utmb }}" = "true" ]; then
            args+=(--fill-utmb)
          fi
          if [ "${{ inputs.fill_itra }}" = "true" ]; then
            args+=(--fill-itra)
          fi
          if [ -n "$ITRA_COOKIE" ]; then
            args+=(--itra-cookie "$ITRA_COOKIE")
          fi
          "${args[@]}"

      - name: Commit and push score repo updates
        env:
          PAGES_REPO_TOKEN: ${{ secrets.PAGES_REPO_TOKEN }}
        run: |
          score_repo="${SCORE_REPO:-mpaladin/trail-intel-score}"
          branch="${SCORE_REPO_BRANCH:-main}"
          token="${SCORE_REPO_TOKEN:-$PAGES_REPO_TOKEN}"
          cd "$TRAILINTEL_SCORE_REPO"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No score repo changes to commit."
            exit 0
          fi
          git commit -m "Seed score cache from Betrail > ${{ inputs.threshold }}"
          git remote set-url origin "https://x-access-token:${token}@github.com/${score_repo}.git"
          git push origin "$branch"
