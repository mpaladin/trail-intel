name: Generate Forecast Report

on:
  workflow_dispatch:
    inputs:
      route_name:
        description: Forecast title
        required: true
        type: string
      gpx_url:
        description: Direct GPX or ZIP URL
        required: true
        type: string
      start_date:
        description: Local start date (YYYY-MM-DD)
        required: true
        type: string
      start_time:
        description: Local start time (HH:MM or HH:MM:SS)
        required: true
        type: string
      timezone_name:
        description: IANA timezone name
        required: true
        default: Europe/Rome
        type: string
      duration:
        description: Ride duration (HH:MM or HH:MM:SS)
        required: true
        default: "03:30"
        type: string
      notes:
        description: Optional notes for this run
        required: false
        type: string

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      request_json: ${{ steps.request.outputs.request_json }}
      route_slug: ${{ steps.request.outputs.route_slug }}
      route_name: ${{ steps.request.outputs.route_name }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - id: request
        env:
          INPUT_ROUTE_NAME: ${{ inputs.route_name }}
          INPUT_GPX_URL: ${{ inputs.gpx_url }}
          INPUT_START_DATE: ${{ inputs.start_date }}
          INPUT_START_TIME: ${{ inputs.start_time }}
          INPUT_TIMEZONE: ${{ inputs.timezone_name }}
          INPUT_DURATION: ${{ inputs.duration }}
          INPUT_NOTES: ${{ inputs.notes }}
        run: |
          PYTHONPATH=src python - <<'PY'
          import json
          import os

          from trailintel.forecast.github_pipeline import (
              ForecastRequest,
              parse_duration,
              request_to_payload,
              _validate_date,
              _validate_time,
              _validate_timezone,
          )
          from trailintel.github_pipeline import validate_public_https_url

          route_name = os.getenv("INPUT_ROUTE_NAME", "").strip()
          if not route_name:
              raise ValueError("Route name is required.")

          source_url = validate_public_https_url(
              os.getenv("INPUT_GPX_URL", "").strip(),
              label="GPX URL",
          )
          request = ForecastRequest(
              route_name=route_name,
              gpx_url=source_url,
              start_date=_validate_date(os.getenv("INPUT_START_DATE", "").strip()),
              start_time=_validate_time(os.getenv("INPUT_START_TIME", "").strip()),
              timezone_name=_validate_timezone(os.getenv("INPUT_TIMEZONE", "").strip()),
              duration=os.getenv("INPUT_DURATION", "").strip(),
              notes=os.getenv("INPUT_NOTES", "").strip(),
          )
          parse_duration(request.duration)
          payload = request_to_payload(request, source_url=source_url)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write("request_json<<EOF\n")
              handle.write(json.dumps(payload, ensure_ascii=False) + "\n")
              handle.write("EOF\n")
              handle.write(f"route_slug={payload.get('route_slug', '')}\n")
              handle.write(f"route_name={payload.get('route_name', '')}\n")
          PY

  run_report:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      REQUEST_JSON: ${{ needs.prepare.outputs.request_json }}
      PAGES_REPO: ${{ vars.PAGES_REPO }}
      PAGES_BRANCH: ${{ vars.PAGES_BRANCH }}
      PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - id: download_source
        name: Download GPX source
        run: |
          mkdir -p dist/input
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          from trailintel.forecast.github_pipeline import download_gpx_source

          payload = json.loads(os.environ["REQUEST_JSON"])
          gpx_path = download_gpx_source(
              source_url=str(payload["source_url"]),
              output_dir=Path("dist/input"),
              github_token=os.getenv("GITHUB_TOKEN") or None,
          )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"gpx_path={gpx_path.as_posix()}\n")
          PY

      - name: Build static forecast bundle
        run: |
          mkdir -p dist/site
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          from trailintel.forecast.bundle import generate_forecast_assets

          payload = json.loads(os.environ["REQUEST_JSON"])
          generate_forecast_assets(
              gpx_path=Path(os.environ["GPX_PATH"]),
              start=f"{payload['start_date']}T{payload['start_time']}",
              duration=str(payload["duration"]),
              output_path=Path("dist/site/forecast.png"),
              site_dir=Path("dist/site"),
              title=str(payload["route_name"]),
              timezone_name=str(payload["timezone_name"]),
          )
          PY
        env:
          GPX_PATH: ${{ steps.download_source.outputs.gpx_path }}

      - uses: actions/upload-artifact@v7
        with:
          name: forecast-report-${{ needs.prepare.outputs.route_slug }}
          path: dist/site

      - name: Validate publish configuration
        env:
          PAGES_REPO_TOKEN: ${{ secrets.PAGES_REPO_TOKEN }}
        run: |
          if [ -z "$PAGES_REPO" ]; then
            echo "Missing repo variable PAGES_REPO (owner/repo)." >&2
            exit 1
          fi
          if [ -z "$PAGES_REPO_TOKEN" ]; then
            echo "Missing secret PAGES_REPO_TOKEN." >&2
            exit 1
          fi

      - name: Clone public Pages repository
        env:
          PAGES_REPO_TOKEN: ${{ secrets.PAGES_REPO_TOKEN }}
        run: |
          branch="${PAGES_BRANCH:-main}"
          git clone --depth 1 --branch "$branch" "https://x-access-token:${PAGES_REPO_TOKEN}@github.com/${PAGES_REPO}.git" pages-repo

      - id: derive_base_url
        run: |
          python - <<'PY'
          import os

          repo = os.getenv("PAGES_REPO", "").strip()
          explicit = os.getenv("PAGES_BASE_URL", "").strip()
          base = explicit
          if not base and "/" in repo:
              owner, name = repo.split("/", 1)
              base = f"https://{owner}.github.io/{name}"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"base_url={base}\n")
          PY

      - id: publish
        env:
          BASE_URL: ${{ steps.derive_base_url.outputs.base_url }}
        run: |
          python - <<'PY'
          from dataclasses import asdict
          from datetime import UTC, datetime
          import json
          import os
          from pathlib import Path

          from trailintel.forecast.github_pipeline import payload_to_request, publish_forecast_bundle

          payload = json.loads(os.environ["REQUEST_JSON"])
          request = payload_to_request(payload)
          result = publish_forecast_bundle(
              source_dir=Path("dist/site"),
              pages_root=Path("pages-repo"),
              request=request,
              published_at=datetime.now(UTC),
              base_url=os.getenv("BASE_URL") or None,
          )
          payload_out = asdict(result)
          Path("dist/publish.json").write_text(
              json.dumps(payload_out, indent=2, ensure_ascii=False),
              encoding="utf-8",
          )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write("publish_json<<EOF\n")
              handle.write(json.dumps(payload_out, ensure_ascii=False) + "\n")
              handle.write("EOF\n")
          PY

      - name: Commit and push published forecast
        run: |
          branch="${PAGES_BRANCH:-main}"
          cd pages-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No Pages changes to commit."
            exit 0
          fi
          git commit -m "Publish forecast: ${{ needs.prepare.outputs.route_name }}"
          git push origin "$branch"
