name: Generate forecast report
description: Request a new static route forecast build for GitHub Pages
title: "[forecast] "
labels: ["forecast-request"]
body:
  - type: input
    id: route_name
    attributes:
      label: Route Name
      description: Friendly title shown on the published forecast page.
      placeholder: "Dolomites Sunrise Recon"
    validations:
      required: true
  - type: input
    id: gpx_url
    attributes:
      label: GPX URL
      description: Optional direct URL to a `.gpx` or `.zip` containing exactly one GPX. Leave blank if you will attach one ZIP in Notes.
      placeholder: "https://example.com/route.gpx"
  - type: input
    id: start_date
    attributes:
      label: Start Date
      description: Local ride date in `YYYY-MM-DD` format.
      placeholder: "2026-07-15"
    validations:
      required: true
  - type: input
    id: start_time
    attributes:
      label: Start Time
      description: Local ride start time in `HH:MM` or `HH:MM:SS` format.
      placeholder: "06:30"
    validations:
      required: true
  - type: input
    id: timezone_name
    attributes:
      label: Timezone
      description: IANA timezone name used to interpret the start date and time.
      value: "Europe/Rome"
    validations:
      required: true
  - type: input
    id: duration
    attributes:
      label: Duration
      description: Ride duration in `HH:MM` or `HH:MM:SS` format.
      value: "03:30"
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Optional notes. If `GPX URL` is blank, drag one ZIP attachment containing exactly one GPX into this field.
      placeholder: "Forecast for a sunrise recon. ZIP attachment is included here if no GPX URL is provided."
